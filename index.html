<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="card">
    <div class="header">
      <h1>BMI Calculator</h1>
      <p>Body Mass Index</p>
    </div>

    <div class="form-group">
      <label>
        Height
        <span class="unit-toggle" id="heightToggle">
          <button class="active" data-unit="metric" onclick="setHeightUnit('metric')">cm</button>
          <button data-unit="imperial" onclick="setHeightUnit('imperial')">ft / in</button>
        </span>
      </label>
      <div class="input-wrap metric-height" id="metricHeight">
        <input type="number" id="heightCm" placeholder="170" min="50" max="300" inputmode="decimal">
        <span class="suffix">cm</span>
      </div>
      <div class="imperial-height" id="imperialHeight">
        <div class="input-wrap">
          <input type="number" id="heightFt" placeholder="5" min="1" max="8" inputmode="numeric">
          <span class="suffix">ft</span>
        </div>
        <div class="input-wrap">
          <input type="number" id="heightIn" placeholder="7" min="0" max="11" inputmode="numeric">
          <span class="suffix">in</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>
        Weight
        <span class="unit-toggle" id="weightToggle">
          <button class="active" data-unit="kg" onclick="setWeightUnit('kg')">kg</button>
          <button data-unit="lbs" onclick="setWeightUnit('lbs')">lbs</button>
        </span>
      </label>
      <div class="input-wrap">
        <input type="number" id="weight" placeholder="70" min="10" max="500" inputmode="decimal">
        <span class="suffix" id="weightSuffix">kg</span>
      </div>
    </div>

    <button class="btn-calculate" onclick="calculate()">Calculate BMI</button>

    <div class="result-panel" id="resultPanel">
      <div class="result-divider"></div>
      <div class="bmi-value" id="bmiValue">--</div>
      <div class="bmi-category" id="bmiCategory">--</div>
      <div class="scale-bar">
        <div class="scale-marker" id="scaleMarker" style="left:0%"></div>
      </div>
      <div class="scale-labels">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
